---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    jkube.eclipse.org/git-commit: f7b2dd9858476e7dc897b4b6e872d9b87c7d61b9
    jkube.eclipse.org/git-url: https://github.com/mohammad2java/argocd-yml-demo.git
    jkube.eclipse.org/git-branch: master
  labels:
    app: argocd-yml-demo
    provider: jkube
    version: 0.0.1-SNAPSHOT
    group: com.example
    app.kubernetes.io/part-of: com.example
    app.kubernetes.io/managed-by: jkube
    app.kubernetes.io/name: argocd-yml-demo
    app.kubernetes.io/version: 0.0.1-SNAPSHOT
  name: argocd-yml-demo
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: argocd-yml-demo
      provider: jkube
      group: com.example
      app.kubernetes.io/name: argocd-yml-demo
      app.kubernetes.io/part-of: com.example
      app.kubernetes.io/managed-by: jkube
  template:
    metadata:
      annotations:
        jkube.eclipse.org/git-commit: f7b2dd9858476e7dc897b4b6e872d9b87c7d61b9
        jkube.eclipse.org/git-url: https://github.com/mohammad2java/argocd-yml-demo.git
        jkube.eclipse.org/git-branch: master
      labels:
        app: argocd-yml-demo
        provider: jkube
        version: 0.0.1-SNAPSHOT
        group: com.example
        app.kubernetes.io/part-of: com.example
        app.kubernetes.io/managed-by: jkube
        app.kubernetes.io/name: argocd-yml-demo
        app.kubernetes.io/version: 0.0.1-SNAPSHOT
      name: argocd-yml-demo
    spec:
      containers:
      - env:
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: traefik/whoami:latest
        imagePullPolicy: IfNotPresent
        name: traefik-argocd-yml-demo
        securityContext:
          privileged: false
